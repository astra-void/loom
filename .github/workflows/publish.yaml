name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.4.4 or v0.4.4-alpha.1
        required: true
        type: string
      dry_run:
        description: Run a dry-run publish instead of publishing to npm
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 24
  WASM_PACK_VERSION: 0.14.0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      npm_dist_tag: ${{ steps.release_metadata.outputs.npm_dist_tag }}
      npm_publish_tag_args: ${{ steps.release_metadata.outputs.npm_publish_tag_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main:refs/remotes/origin/main

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            packages/compiler/target
            packages/layout-engine/target
            packages/preview-analysis/target
          key: ${{ runner.os }}-publish-preflight-rust-${{ hashFiles('packages/compiler/Cargo.lock', 'packages/compiler/Cargo.toml', 'packages/layout-engine/Cargo.lock', 'packages/layout-engine/Cargo.toml', 'packages/preview-analysis/Cargo.lock', 'packages/preview-analysis/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-publish-preflight-rust-

      - name: Install wasm-pack
        run: |
          if command -v wasm-pack >/dev/null 2>&1; then
            current_version="$(wasm-pack --version | awk '{print $2}')"
          else
            current_version=""
          fi

          if [ "$current_version" = "$WASM_PACK_VERSION" ]; then
            echo "Using cached wasm-pack ${current_version}"
          else
            rm -f "$HOME/.cargo/bin/wasm-pack"
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate release metadata
        run: pnpm release:validate

      - name: Verify preview package consumer flow
        run: pnpm verify:preview-package

      - name: Derive release metadata
        id: release_metadata
        run: |
          pnpm exec tsx <<'EOF'
          import { appendFileSync } from "node:fs";
          import { getReleaseDistTag } from "./scripts/release/validate-release.ts";
          
          const tagName = process.env.RELEASE_TAG;
          
          if (!tagName) {
          	throw new Error("RELEASE_TAG is required to derive release metadata.");
          }
          
          const distTag = getReleaseDistTag(tagName);
          const outputPath = process.env.GITHUB_OUTPUT;
          
          if (!outputPath) {
          	throw new Error("GITHUB_OUTPUT is required to derive release metadata.");
          }
          
          appendFileSync(outputPath, `npm_dist_tag=${distTag ?? ""}\n`);
          appendFileSync(
          	outputPath,
          	`npm_publish_tag_args=${distTag ? `--tag ${distTag}` : ""}\n`,
          );
          EOF

  build-compiler:
    name: Build compiler ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
            platform_arch_abi: darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-14
            platform_arch_abi: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform_arch_abi: linux-x64-gnu
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform_arch_abi: linux-x64-musl
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            platform_arch_abi: linux-arm64-gnu
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            platform_arch_abi: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            runner: ubuntu-latest
            platform_arch_abi: win32-x64-msvc
          - target: aarch64-pc-windows-msvc
            runner: ubuntu-latest
            platform_arch_abi: win32-arm64-msvc

    env:
      XWIN_ACCEPT_LICENSE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            packages/compiler/target
          key: ${{ runner.os }}-${{ matrix.target }}-publish-rust-${{ hashFiles('packages/compiler/Cargo.lock', 'packages/compiler/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-publish-rust-

      - name: Install Zig
        if: runner.os == 'Linux' || matrix.target == 'x86_64-apple-darwin'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cross-compilation tools
        if: runner.os == 'Linux'
        run: cargo install cargo-zigbuild cargo-xwin --locked --force

      - name: Install wasm-pack
        run: |
          if command -v wasm-pack >/dev/null 2>&1; then
            current_version="$(wasm-pack --version | awk '{print $2}')"
          else
            current_version=""
          fi

          if [ "$current_version" = "$WASM_PACK_VERSION" ]; then
            echo "Using cached wasm-pack ${current_version}"
          else
            rm -f "$HOME/.cargo/bin/wasm-pack"
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build compiler target
        run: pnpm --filter @loom-dev/compiler run build:native -- --target ${{ matrix.target }}

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiler-artifact-${{ matrix.platform_arch_abi }}
          path: packages/compiler/loom_compiler.${{ matrix.platform_arch_abi }}.node
          if-no-files-found: error

  publish-compiler:
    name: Publish compiler packages
    needs:
      - preflight
      - build-compiler
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      LOOM_PUBLISH_CLIENT: npm
      NPM_PUBLISH_TAG_ARGS: ${{ needs.preflight.outputs.npm_publish_tag_args }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            packages/compiler/target
          key: ${{ runner.os }}-publish-compiler-rust-${{ hashFiles('packages/compiler/Cargo.lock', 'packages/compiler/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-publish-compiler-rust-

      - name: Install wasm-pack
        run: |
          if command -v wasm-pack >/dev/null 2>&1; then
            current_version="$(wasm-pack --version | awk '{print $2}')"
          else
            current_version=""
          fi

          if [ "$current_version" = "$WASM_PACK_VERSION" ]; then
            echo "Using cached wasm-pack ${current_version}"
          else
            rm -f "$HOME/.cargo/bin/wasm-pack"
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download compiler artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compiler-artifact-*
          merge-multiple: true
          path: packages/compiler/artifacts

      - name: Resolve existing GitHub release
        id: release_id
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module <<'EOF'
          import { writeFileSync } from "node:fs";

          const outputPath = process.env.GITHUB_OUTPUT;
          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const tag = process.env.RELEASE_TAG;

          if (!outputPath || !token || !repository || !tag) {
            throw new Error("Missing inputs for GitHub release lookup.");
          }

          const response = await fetch(
            `https://api.github.com/repos/${repository}/releases/tags/${encodeURIComponent(tag)}`,
            {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            },
          );

          if (response.status === 404) {
            writeFileSync(outputPath, "gh_release_id=\n");
            process.exit(0);
          }

          if (!response.ok) {
            throw new Error(
              `Failed to resolve release ${tag}: ${response.status} ${response.statusText}`,
            );
          }

          const release = await response.json();
          writeFileSync(outputPath, `gh_release_id=${release.id}\n`);
          EOF

      - name: Publish compiler packages
        env:
          NAPI_GH_RELEASE_ID: ${{ steps.release_id.outputs.gh_release_id }}
        run: pnpm --filter @loom-dev/compiler run publish:napi -- --access public $NPM_PUBLISH_TAG_ARGS

  publish-packages:
    name: Publish workspace packages
    needs:
      - preflight
      - publish-compiler
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NPM_PUBLISH_TAG_ARGS: ${{ needs.preflight.outputs.npm_publish_tag_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            packages/layout-engine/target
            packages/preview-analysis/target
          key: ${{ runner.os }}-publish-packages-rust-${{ hashFiles('packages/layout-engine/Cargo.lock', 'packages/layout-engine/Cargo.toml', 'packages/preview-analysis/Cargo.lock', 'packages/preview-analysis/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-publish-packages-rust-

      - name: Install wasm-pack
        run: |
          if command -v wasm-pack >/dev/null 2>&1; then
            current_version="$(wasm-pack --version | awk '{print $2}')"
          else
            current_version=""
          fi

          if [ "$current_version" = "$WASM_PACK_VERSION" ]; then
            echo "Using cached wasm-pack ${current_version}"
          else
            rm -f "$HOME/.cargo/bin/wasm-pack"
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Download compiler artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compiler-artifact-*
          merge-multiple: true
          path: packages/compiler/artifacts

      - name: Build compiler package outputs for workspace consumers
        run: pnpm --filter @loom-dev/compiler run build

      - name: Publish workspace packages
        run: pnpm publish:workspace-packages -- --access public $NPM_PUBLISH_TAG_ARGS
