name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 24
  WASM_PACK_VERSION: 0.14.0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            packages/compiler/target
            packages/layout-engine/target
          key: ${{ runner.os }}-rust-${{ hashFiles('packages/compiler/Cargo.lock', 'packages/compiler/Cargo.toml', 'packages/layout-engine/Cargo.lock', 'packages/layout-engine/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install wasm-pack
        run: |
          if command -v wasm-pack >/dev/null 2>&1; then
            current_version="$(wasm-pack --version | awk '{print $2}')"
          else
            current_version=""
          fi

          if [ "$current_version" = "$WASM_PACK_VERSION" ]; then
            echo "Using cached wasm-pack ${current_version}"
          else
            rm -f "$HOME/.cargo/bin/wasm-pack"
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify generated artifacts
        run: pnpm verify:dts
