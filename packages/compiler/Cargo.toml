[package]
name = "loom-compiler"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.8.3"
napi-derive = "3.5.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
swc_core = { version = "58.0.4", features = [
  "common",
  "ecma_ast",
  "ecma_visit",
  "ecma_codegen",
  "ecma_parser",
  "ecma_parser_typescript"
] }
